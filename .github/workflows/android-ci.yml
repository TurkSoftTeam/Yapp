name: Android CI

on:
  push:
    branches: [main, android-compose-starter]
  pull_request:
    branches: [main, android-compose-starter]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew build
        env:
          _JAVA_OPTIONS: "-Xmx4g"
          ORG_GRADLE_PROJECT_ANDROID_D8_DEXER_HEAP_SIZE: "4096M"